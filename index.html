<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dang Minh Quan — AI Engineer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Global styles -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Section styles -->
  <link rel="stylesheet" href="about/about.css" />
  <link rel="stylesheet" href="experience/experience.css" />
  <link rel="stylesheet" href="achievements/achievements.css" />
  <link rel="stylesheet" href="projects/projects.css" />
  <link rel="stylesheet" href="contact/contact.css" />
</head>
<body>

  <!-- NAV -->
  <nav id="navbar">
    <div class="nav-inner">
      <a class="nav-logo" href="#about">DMQ</a>
      <ul class="nav-links">
        <li><a href="#about"        data-section="about">About</a></li>
        <li><a href="#experience"   data-section="experience">Experience</a></li>
        <li><a href="#achievements" data-section="achievements">Achievements</a></li>
        <li><a href="#projects"     data-section="projects">Projects</a></li>
        <li><a href="#contact"      data-section="contact">Contact</a></li>
      </ul>
      <button class="hamburger" id="hamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <ul>
      <li><a href="#about"        onclick="closeMobileMenu()">About</a></li>
      <li><a href="#experience"   onclick="closeMobileMenu()">Experience</a></li>
      <li><a href="#achievements" onclick="closeMobileMenu()">Achievements</a></li>
      <li><a href="#projects"     onclick="closeMobileMenu()">Projects</a></li>
      <li><a href="#contact"      onclick="closeMobileMenu()">Contact</a></li>
    </ul>
  </div>

  <!-- SECTIONS -->
  <div id="about-root"></div>
  <div id="experience-root"></div>
  <div id="achievements-root"></div>
  <div id="projects-root"></div>
  <div id="contact-root"></div>

  <!-- PROJECT MODAL (global) -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
  <div class="project-modal" id="projectModal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-content" id="modalContent"></div>
  </div>

  <footer>
    <p>© 2026 Dang Minh Quan · Built with care</p>
  </footer>

  <!-- Data -->
  <script src="experience/experience.data.js"></script>
  <script src="projects/projects.data.js"></script>

  <!-- Section renderers -->
  <script src="about/about.js"></script>
  <script src="experience/experience.js"></script>
  <script src="achievements/achievements.js"></script>
  <script src="projects/projects.js"></script>
  <script src="contact/contact.js"></script>

  <!-- Core -->
  <script src="main.js"></script>

</body>
</html>
